name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - uses: actions/configure-pages@v5
      - name: Diagnose Puppeteer runtime
        run: |
          set -eux
          PUPPETEER_BIN="$(node --input-type=module -e "import puppeteer from 'puppeteer'; console.log(puppeteer.executablePath())")"
          echo "PUPPETEER_BIN=$PUPPETEER_BIN"
          uname -a
          ldd --version || true
          if command -v google-chrome >/dev/null 2>&1; then google-chrome --version; fi
          if command -v chromium >/dev/null 2>&1; then chromium --version; fi
          if command -v chromium-browser >/dev/null 2>&1; then chromium-browser --version; fi
          if [ -x "$PUPPETEER_BIN" ]; then ldd "$PUPPETEER_BIN" || true; fi
          npx puppeteer browsers list || true
      - name: Build
        env:
          GITHUB_PAGES: "true"
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          PUBLIC_GA_MEASUREMENT_ID: ${{ vars.PUBLIC_GA_MEASUREMENT_ID || secrets.PUBLIC_GA_MEASUREMENT_ID }}
          DEBUG: "puppeteer:*"
        run: pnpm build
      - name: Index with Pagefind (CJK support)
        run: npx -y pagefind --site dist
      - name: Disable Jekyll
        run: touch dist/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with: { path: dist }
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
