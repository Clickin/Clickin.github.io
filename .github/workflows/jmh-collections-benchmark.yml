name: JMH Collections Benchmark

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "benchmarks/jmh-arraylist-vs-linkedlist/**"
      - ".github/workflows/jmh-collections-benchmark.yml"

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Temurin 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build JMH benchmark jar
        run: mvn -B -ntp -f benchmarks/jmh-arraylist-vs-linkedlist/pom.xml clean package

      - name: Run JMH benchmarks
        run: |
          mkdir -p benchmarks/jmh-arraylist-vs-linkedlist/results
          java -jar benchmarks/jmh-arraylist-vs-linkedlist/target/jmh-benchmarks.jar \
            io.clickin.bench.ListAndDequeBenchmark \
            -wi 5 \
            -i 8 \
            -w 300ms \
            -r 300ms \
            -f 1 \
            -tu ns \
            -jvmArgs "-Xms1g -Xmx1g" \
            -rf json \
            -rff benchmarks/jmh-arraylist-vs-linkedlist/results/jmh-result.json \
            -o benchmarks/jmh-arraylist-vs-linkedlist/results/jmh-result.txt

      - name: Capture runtime environment
        run: |
          java -version > benchmarks/jmh-arraylist-vs-linkedlist/results/java-version.txt
          lscpu > benchmarks/jmh-arraylist-vs-linkedlist/results/lscpu.txt

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jmh-collections-results
          path: benchmarks/jmh-arraylist-vs-linkedlist/results
          if-no-files-found: error
